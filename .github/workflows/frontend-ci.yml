name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root browser tooling
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Smoke test frontend
        working-directory: frontend
        run: |
          npm run start > /tmp/opspilot-frontend.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3001 > /dev/null; then
              npm run smoke:landing
              npm run smoke:routes
              exit 0
            fi
            sleep 2
          done
          cat /tmp/opspilot-frontend.log
          exit 1
